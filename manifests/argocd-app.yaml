apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aurora-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/BryanPruneda/Project-Aurora-Automated-GitOps-ML-Pipeline.git
    targetRevision: HEAD
    path: charts/ml-app
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
