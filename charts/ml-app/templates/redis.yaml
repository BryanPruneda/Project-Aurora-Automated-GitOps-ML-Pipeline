apiVersion: apps/v1
kind: Deployment
metadata:
  name: aurora-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aurora-redis
  template:
    metadata:
      labels:
        app: aurora-redis
    spec:
      containers:
      - name: redis
        image: redis:alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: aurora-redis-service
spec:
  selector:
    app: aurora-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
