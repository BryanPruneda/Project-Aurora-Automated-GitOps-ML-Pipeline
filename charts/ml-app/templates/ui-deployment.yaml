apiVersion: apps/v1
kind: Deployment
metadata:
  name: aurora-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aurora-ui
  template:
    metadata:
      labels:
        app: aurora-ui
    spec:
      containers:
      - name: ui-container
        image: aurora-ui:v1.0.0
        ports:
        - containerPort: 8501
        env:
        - name: MODEL_API_URL
          value: "http://aurora-service:80"
